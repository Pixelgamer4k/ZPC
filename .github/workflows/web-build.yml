name: Build Web

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - '.github/workflows/web-build.yml'
      - 'scripts/**'
  pull_request:
    paths:
      - 'web/**'
  workflow_dispatch:

concurrency:
  group: web-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build React Web App
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpc-web-${{ github.sha }}
          path: web/dist/
          retention-days: 30

      - name: Build summary
        run: |
          SIZE=$(du -sh dist | cut -f1)
          echo "## ZPC Web Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Bundle size:** $SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Termux launch:** \`./scripts/start-termux.sh\`" >> "$GITHUB_STEP_SUMMARY"
