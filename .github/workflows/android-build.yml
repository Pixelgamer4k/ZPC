name: Build Android

on:
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    paths:
      - 'mobile/**'
  workflow_dispatch:

concurrency:
  group: android-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npm run lint

      - name: Prebuild native Android project
        run: npx expo prebuild --platform android --non-interactive

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: zpc-android-${{ github.sha }}
          path: mobile/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Build summary
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          SIZE=$(du -h "$APK_PATH" | cut -f1)
          echo "## ZPC Android Build" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **APK size:** $SIZE" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Package:** com.zpc.mobile" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
